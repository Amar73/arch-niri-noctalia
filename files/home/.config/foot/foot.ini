# =============================================================================
# ~/.config/foot/foot.ini — конфигурация терминала foot
# Палитра: Catppuccin Mocha — согласована с Noctalia dark
# =============================================================================

[main]
font=JetBrainsMono Nerd Font:size=11
dpi-aware=yes
shell=/usr/bin/bash
term=foot

[scrollback]
lines=10000

[url]
launch=xdg-open ${url}
# Ctrl+Shift+U — открыть URL под курсором
osc8-underline=url-mode

[cursor]
style=beam
blink=yes
blink-rate=500

[mouse]
hide-when-typing=yes

[colors]
# alpha: 0.0 прозрачный — 1.0 непрозрачный
alpha=0.95
background=111111
foreground=cdd6f4

# Цвета нормального текста (0–7)
regular0=45475a   # black   (surface1)
regular1=f38ba8   # red     (red)
regular2=a6e3a1   # green   (green)
regular3=f9e2af   # yellow  (yellow)
regular4=89b4fa   # blue    (blue)
regular5=cba6f7   # magenta (mauve)
regular6=89dceb   # cyan    (sky)
regular7=bac2de   # white   (subtext1)

# Яркие цвета (8–15, для bold и bright escape-кодов)
bright0=585b70    # bright black  (surface2)
bright1=f38ba8    # bright red
bright2=a6e3a1    # bright green
bright3=f9e2af    # bright yellow
bright4=89b4fa    # bright blue
bright5=cba6f7    # bright magenta
bright6=89dceb    # bright cyan
bright7=a6adc8    # bright white (subtext0)

[key-bindings]
# Стандартные биндинги foot, переопределяем только что нужно
scrollback-up-page=Shift+Page_Up
scrollback-down-page=Shift+Page_Down
clipboard-copy=Control+Shift+c
clipboard-paste=Control+Shift+v
search-start=Control+Shift+r
