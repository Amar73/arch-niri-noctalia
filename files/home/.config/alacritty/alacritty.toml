# =============================================================================
# ~/.config/alacritty/alacritty.toml
# Документация: https://alacritty.org/config-alacritty.html
# =============================================================================

[general]
import = [
    "~/.config/alacritty/themes/themes/breeze.toml"
]

# =============================================================================
# ТЕРМИНАЛ
# =============================================================================

[terminal]
# shell перенесён из [general] в [terminal] начиная с Alacritty 0.14
shell = "/usr/bin/bash"

# =============================================================================
# ОКНО
# =============================================================================

[window]
padding    = { x = 8, y = 8 }
# None — нет заголовка, niri управляет декорациями через prefer-no-csd
decorations = "None"
# 0.95 — лёгкая прозрачность, как у waybar
opacity     = 0.95
blur        = false

[window.dimensions]
columns = 120
lines   = 35

# =============================================================================
# ПРОКРУТКА
# =============================================================================

[scrolling]
history    = 10000
multiplier = 3

# =============================================================================
# ШРИФТ
# =============================================================================

[font]
size = 15.0

[font.normal]
family = "JetBrainsMono Nerd Font"
style  = "Regular"

[font.bold]
family = "JetBrainsMono Nerd Font"
style  = "Bold"

[font.italic]
family = "JetBrainsMono Nerd Font"
style  = "Italic"

[font.bold_italic]
family = "JetBrainsMono Nerd Font"
style  = "Bold Italic"

[font.offset]
x = 0
y = 1

# =============================================================================
# КУРСОР
# =============================================================================

[cursor]
style            = { shape = "Underline", blinking = "On" }
blink_interval   = 500
blink_timeout    = 0
unfocused_hollow = true
thickness        = 0.15

# =============================================================================
# МЫШЬ
# =============================================================================

[mouse]
hide_when_typing = true

# =============================================================================
# ВЫДЕЛЕНИЕ ТЕКСТА
# =============================================================================

[selection]
# Выделение левой кнопкой мыши автоматически копирует в системный буфер обмена.
# Вставка: Ctrl+Shift+V или правая кнопка мыши (см. mouse.bindings ниже)
save_to_clipboard = true

# =============================================================================
# БИНДИНГИ КЛАВИШ
# =============================================================================

[keyboard]
bindings = [
  { key = "C", mods = "Control|Shift", action = "Copy"            },
  { key = "V", mods = "Control|Shift", action = "Paste"           },
  { key = "F", mods = "Control|Shift", action = "SearchForward"   },
  { key = "B", mods = "Control|Shift", action = "SearchBackward"  },
  { key = "Plus",  mods = "Control",   action = "IncreaseFontSize" },
  { key = "Minus", mods = "Control",   action = "DecreaseFontSize" },
  { key = "Key0",  mods = "Control",   action = "ResetFontSize"    },
  { key = "PageUp",   mods = "Shift",  action = "ScrollPageUp"    },
  { key = "PageDown", mods = "Shift",  action = "ScrollPageDown"  },
  { key = "Home",     mods = "Shift",  action = "ScrollToTop"     },
  { key = "End",      mods = "Shift",  action = "ScrollToBottom"  },
]

# =============================================================================
# БИНДИНГИ МЫШИ
# =============================================================================

# Правая кнопка мыши — вставить из буфера обмена
[[mouse.bindings]]
mouse  = "Right"
action = "Paste"

# =============================================================================
# URL — открывать по Ctrl+клик или Ctrl+Shift+U
# =============================================================================

[[hints.enabled]]
regex = "(https?|ftp|file)://[\\w\\-.~:/?#\\[\\]@!$&'()*+,;=%]+"
command = "xdg-open"
post_processing = true
mouse = { enabled = true, mods = "Control" }
binding = { key = "U", mods = "Control|Shift" }
